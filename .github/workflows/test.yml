name: Test
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff mypy
      - run: ruff check opendesk/
      - run: mypy opendesk/ --ignore-missing-imports

  stdout_hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/test_stdout_hygiene.py -v

  test:
    needs: [lint, stdout_hygiene]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tesseract-ocr scrot xdotool xclip zenity
      
      - name: Install
        run: |
          pip install -e ".[dev]"
      
      - name: Install platform extras (Mac)
        if: runner.os == 'macOS'
        run: pip install -e ".[mac]"
      
      - name: Install platform extras (Windows)
        if: runner.os == 'Windows'
        run: pip install -e ".[windows]"
      
      - name: Unit tests
        run: pytest tests/unit -v
      
      - name: E2E tests
        run: pytest tests/e2e -v
      
      - name: Coverage
        run: pytest --cov=opendesk --cov-report=xml
      
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage/xml